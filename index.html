<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real 2026 World Cup Betting</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --accent: #00ff88;
            --text-main: #ffffff;
            --text-muted: #8fa0dd;
            --danger: #ff4a5a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2 {
            margin-bottom: 24px;
            text-align: center;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 14px;
        }

        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            border: none;
            border-radius: 8px;
            color: var(--bg-color);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tokens-badge {
            background-color: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .match-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .match-status {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .teams-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
        }

        .bet-options {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .bet-btn {
            background-color: var(--bg-color);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            font-size: 14px;
            border-radius: 6px;
        }

        .bet-btn.selected {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        .error-msg {
            color: var(--danger);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .pending-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen">
        <h2>wc 2026 live gateway</h2>
        <div class="form-group">
            <label for="username">username</label>
            <input type="text" id="username" placeholder="username">
        </div>
        <div class="form-group">
            <label for="password">password</label>
            <input type="password" id="password" placeholder="password">
        </div>
        <button id="login-btn">login / register</button>
        <div id="auth-error" class="error-msg"></div>
    </div>

    <div id="dashboard-screen" class="hidden">
        <div class="dashboard-header">
            <div>
                <span id="user-display" style="font-weight: bold;"></span>
            </div>
            <div class="tokens-badge"><span id="token-count">100</span> tokens</div>
        </div>

        <div class="match-card">
            <div id="match-status" class="match-status">loading real matches...</div>
            <div id="match-time" style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;"></div>
            <div class="teams-display">
                <span id="home-team">-</span>
                <span id="live-score" style="color: var(--accent); font-size: 22px;">vs</span>
                <span id="away-team">-</span>
            </div>

            <div id="betting-controls" class="hidden">
                <div class="form-group">
                    <label for="bet-amount">bet amount</label>
                    <input type="number" id="bet-amount" min="1" placeholder="tokens amount">
                </div>
                <div class="bet-options">
                    <button class="bet-btn" data-choice="HOME" id="btn-home">1</button>
                    <button class="bet-btn" data-choice="DRAW" id="btn-draw">X</button>
                    <button class="bet-btn" data-choice="AWAY" id="btn-away">2</button>
                </div>
                <button id="place-bet-btn" style="margin-top: 15px;">place real bet</button>
            </div>

            <div id="active-bet-display" class="hidden">
                <div class="pending-box">
                    <p style="margin-bottom: 10px;">locked <strong id="locked-amount">0</strong> tokens on <strong id="locked-choice">-</strong></p>
                    <button id="check-results-btn" style="background-color: var(--text-muted);">check api for final score</button>
                </div>
            </div>
            
            <div id="dashboard-error" class="error-msg"></div>
        </div>
    </div>
</div>

<script>
    const API_KEY = '143cc95074024c19bb436d5a8257d5e7';
    let currentUser = null;
    let currentMatch = null;
    let selectedChoice = null;

    document.getElementById('login-btn').addEventListener('click', async () => {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const errDiv = document.getElementById('auth-error');

        if (!user || !pass) {
            errDiv.textContent = "all fields are mandatory.";
            return;
        }

        let stored = localStorage.getItem(`wc_live_user_${user}`);
        
        if (stored) {
            let parsed = JSON.parse(stored);
            if (parsed.password !== pass) {
                errDiv.textContent = "wrong password.";
                return;
            }
            currentUser = user;
        } else {
            localStorage.setItem(`wc_live_user_${user}`, JSON.stringify({
                username: user, password: pass, tokens: 100, activeBet: null
            }));
            currentUser = user;
        }

        errDiv.textContent = "";
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('dashboard-screen').classList.remove('hidden');
        document.getElementById('user-display').textContent = currentUser;
        
        await fetchLiveWorldCupData();
    });

    async function fetchLiveWorldCupData() {
        const errDiv = document.getElementById('dashboard-error');
        try {
            const proxyUrl = 'https://corsproxy.io/?';
            const targetUrl = 'https://api.football-data.org/v4/competitions/WC/matches';
            
            const response = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
                headers: { 'X-Auth-Token': API_KEY }
            });

            if (!response.ok) throw new Error("api rejected the token, rate limit hit, or proxy failed.");

            const data = await response.json();
            if (!data.matches || data.matches.length === 0) {
                errDiv.textContent = "no real world cup matches found in data layer.";
                return;
            }

            const now = new Date();
            let sorted = data.matches.sort((a, b) => Math.abs(new Date(a.utcDate) - now) - Math.abs(new Date(b.utcDate) - now));
            currentMatch = sorted[0];

            renderMatchData();
        } catch (err) {
            errDiv.textContent = err.message + " - Check network connection or proxy availability.";
        }
    }

    function renderMatchData() {
        if (!currentMatch) return;

        document.getElementById('home-team').textContent = currentMatch.homeTeam.shortName || currentMatch.homeTeam.name;
        document.getElementById('away-team').textContent = currentMatch.awayTeam.shortName || currentMatch.awayTeam.name;
        document.getElementById('match-time').textContent = new Date(currentMatch.utcDate).toLocaleString();
        
        document.getElementById('btn-home').textContent = currentMatch.homeTeam.tla || "1";
        document.getElementById('btn-draw').textContent = "Draw";
        document.getElementById('btn-away').textContent = currentMatch.awayTeam.tla || "2";

        if (currentMatch.status === 'IN_PLAY' || currentMatch.status === 'PAUSED') {
            document.getElementById('match-status').textContent = "LIVE NOW";
            document.getElementById('live-score').textContent = `${currentMatch.score.fullTime.home ?? 0} - ${currentMatch.score.fullTime.away ?? 0}`;
        } else if (currentMatch.status === 'FINISHED') {
            document.getElementById('match-status').textContent = "FINISHED";
            document.getElementById('live-score').textContent = `${currentMatch.score.fullTime.home} - ${currentMatch.score.fullTime.away}`;
        } else {
            document.getElementById('match-status').textContent = "UPCOMING";
            document.getElementById('live-score').textContent = "vs";
        }

        syncBettingUI();
    }

    function syncBettingUI() {
        let userData = JSON.parse(localStorage.getItem(`wc_live_user_${currentUser}`));
        document.getElementById('token-count').textContent = userData.tokens;

        if (userData.activeBet && userData.activeBet.matchId === currentMatch.id) {
            document.getElementById('betting-controls').classList.add('hidden');
            document.getElementById('active-bet-display').classList.remove('hidden');
            document.getElementById('locked-amount').textContent = userData.activeBet.amount;
            document.getElementById('locked-choice').textContent = userData.activeBet.choice;
        } else {
            document.getElementById('betting-controls').classList.remove('hidden');
            document.getElementById('active-bet-display').classList.add('hidden');
        }
    }

    document.querySelectorAll('.bet-options .bet-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.bet-options .bet-btn').forEach(b => b.classList.remove('selected'));
            e.target.classList.add('selected');
            selectedChoice = e.target.getAttribute('data-choice');
        });
    });

    document.getElementById('place-bet-btn').addEventListener('click', () => {
        const amount = parseInt(document.getElementById('bet-amount').value);
        const errDiv = document.getElementById('dashboard-error');
        let userData = JSON.parse(localStorage.getItem(`wc_live_user_${currentUser}`));

        if (!selectedChoice) {
            errDiv.textContent = "select your outcome team.";
            return;
        }
        if (isNaN(amount) || amount <= 0 || amount > userData.tokens) {
            errDiv.textContent = "invalid token volume allocation.";
            return;
        }

        userData.tokens -= amount;
        userData.activeBet = {
            matchId: currentMatch.id,
            amount: amount,
            choice: selectedChoice
        };

        localStorage.setItem(`wc_live_user_${currentUser}`, JSON.stringify(userData));
        syncBettingUI();
    });

    document.getElementById('check-results-btn').addEventListener('click', async () => {
        await fetchLiveWorldCupData();
        const errDiv = document.getElementById('dashboard-error');
        let userData = JSON.parse(localStorage.getItem(`wc_live_user_${currentUser}`));

        if (currentMatch.status !== 'FINISHED') {
            errDiv.textContent = `match status is still: ${currentMatch.status}. you can only collect tokens after the full-time whistle blown.`;
            return;
        }

        const homeScore = currentMatch.score.fullTime.home;
        const awayScore = currentMatch.score.fullTime.away;
        let finalOutcome = 'DRAW';

        if (homeScore > awayScore) finalOutcome = 'HOME';
        if (awayScore > homeScore) finalOutcome = 'AWAY';

        if (userData.activeBet.choice === finalOutcome) {
            let winAmount = userData.activeBet.amount * 2;
            userData.tokens += winAmount;
            errDiv.innerHTML = `<span style="color: var(--accent)">you won! +${winAmount} tokens added.</span>`;
        } else {
            errDiv.textContent = "bet lost. real score did not match your pick.";
        }

        userData.activeBet = null;
        localStorage.setItem(`wc_live_user_${currentUser}`, JSON.stringify(userData));
        syncBettingUI();
    });
</script>

</body>
</html>
