
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЧМ-2026 Реальные Ставки</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .balance-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--accent-color);
            font-weight: bold;
        }

        .balance-box span {
            color: var(--success-color);
        }

        .match-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        .match-status {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .team {
            flex: 1;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .vs {
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 0 10px;
        }

        .match-time {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .bet-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .bet-input-wrapper {
            display: flex;
            gap: 8px;
        }

        input[type="number"] {
            flex: 1;
            background: #0b0f19;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .quick-bet-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 0 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .bet-options {
            display: flex;
            gap: 12px;
        }

        .bet-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .bet-btn:hover:not(:disabled) {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .bet-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .active-bet-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px dashed var(--accent-color);
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            text-align: center;
        }

        .action-btn {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 16px;
        }

        .notification {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .notification.success { background: rgba(16, 185, 129, 0.15); color: var(--success-color); display: block; }
        .notification.error { background: rgba(239, 68, 68, 0.15); color: var(--danger-color); display: block; }
        .notification.info { background: rgba(59, 130, 246, 0.15); color: var(--accent-color); display: block; }

        .reset-btn {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            font-size: 0.8rem; text-decoration: underline; margin-top: 20px; display: block; width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ЧМ-2026 LIVE Ставки</h1>
        <div class="balance-box">Баланс: <span id="balance">100</span> 🪙</div>
    </header>

    <main>
        <div class="match-card">
            <div class="match-status" id="match-status">Загрузка данных из API...</div>
            <div class="teams">
                <div class="team" id="team1">...</div>
                <div class="vs">VS</div>
                <div class="team" id="team2">...</div>
            </div>
            <div class="match-time" id="match-time">проверяем расписание</div>
        </div>

        <div class="bet-section" id="bet-section">
            <div class="input-group">
                <label for="bet-amount">Сумма ставки:</label>
                <div class="bet-input-wrapper">
                    <input type="number" id="bet-amount" min="1" value="10">
                    <button class="quick-bet-btn" onclick="setAllIn()">Ва-банк</button>
                </div>
            </div>

            <div class="bet-options">
                <button class="bet-btn" onclick="placeBet('1')" id="btn-team1">П1</button>
                <button class="bet-btn" onclick="placeBet('X')" id="btn-draw">Ничья</button>
                <button class="bet-btn" onclick="placeBet('2')" id="btn-team2">П2</button>
            </div>
        </div>

        <div id="active-bet-display" class="active-bet-info" style="display: none;">
            Твоя ставка: <span id="bet-detail"></span>
        </div>

        <button class="action-btn" onclick="loadDataFromAPI()">Обновить данные матчей</button>

        <div id="notification" class="notification"></div>
        
        <button class="reset-btn" onclick="resetApp()">Сбросить баланс до 100</button>
    </main>
</div>

<script>
    let state = {
        balance: 100,
        activeBet: null, 
        currentMatch: null,
        allMatches: []
    };

    async function init() {
        const savedBalance = localStorage.getItem('real_wc_bal');
        const savedBet = localStorage.getItem('real_wc_bet');
        
        if (savedBalance !== null) state.balance = parseInt(savedBalance);
        if (savedBet !== null) state.activeBet = JSON.parse(savedBet);

        updateBalanceDisplay();
        await loadDataFromAPI();
    }

    function updateBalanceDisplay() {
        document.getElementById('balance').innerText = state.balance;
        localStorage.setItem('real_wc_bal', state.balance);
    }

    async function loadDataFromAPI() {
        showNotification('Получаем данные с сервера ЧМ...', 'info');
        try {
            // запрашиваем реальное live-расписание турнира
            const response = await fetch('https://worldcupjson.net/matches');
            if (!response.ok) throw new Error('ошибка сервера');
            
            state.allMatches = await response.json();
            
            checkExistingBetStatus();
            findClosestMatch();
            render();
            showNotification('Данные успешно обновлены', 'success');
        } catch (error) {
            console.error(error);
            showNotification('Не удалось обновить данные. Проверь инет.', 'error');
            // если апи лежит, подставляем заглушку чтобы фронт не умер
            if(state.allMatches.length === 0) useFallbackData();
        }
    }

    function useFallbackData() {
        state.allMatches = [
            { id: 999, status: 'future', home_team: {country: 'Бразилия'}, away_team: {country: 'Испания'}, datetime: new Date(Date.now() + 3600000).toISOString() }
        ];
        findClosestMatch();
        render();
    }

    function findClosestMatch() {
        if (state.activeBet) {
            state.currentMatch = state.allMatches.find(m => m.id === state.activeBet.matchId);
            if (state.currentMatch) return;
        }

        // ищем первый матч, который идет прямо сейчас или начнется в будущем
        let liveOrFuture = state.allMatches.filter(m => m.status === 'in_progress' || m.status === 'future');
        
        if (liveOrFuture.length > 0) {
            // сортируем по времени, чтобы взять самый близкий
            liveOrFuture.sort((a,b) => new Date(a.datetime) - new Date(b.datetime));
            state.currentMatch = liveOrFuture[0];
        } else {
            // если турнир кончился, берем последний сыгранный матч
            state.currentMatch = state.allMatches[state.allMatches.length - 1];
        }
    }

    function checkExistingBetStatus() {
        if (!state.activeBet) return;

        const serverMatch = state.allMatches.find(m => m.id === state.activeBet.matchId);
        if (!serverMatch) return;

        if (serverMatch.status === 'completed') {
            const homeGoals = serverMatch.home_team.goals;
            const awayGoals = serverMatch.away_team.goals;
            
            let realOutcome = 'X';
            if (homeGoals > awayGoals) realOutcome = '1';
            if (awayGoals > homeGoals) realOutcome = '2';

            const isWin = state.activeBet.choice === realOutcome;
            const homeName = serverMatch.home_team.country;
            const awayName = serverMatch.away_team.country;

            if (isWin) {
                const prize = state.activeBet.amount * 2;
                state.balance += prize;
                alert(`Матч ${homeName} - ${awayName} завершен со счетом ${homeGoals}:${awayGoals}.\nТвоя ставка зашла! Получаешь ${prize} коинов.`);
            } else {
                alert(`Матч ${homeName} - ${awayName} завершен со счетом ${homeGoals}:${awayGoals}.\nСтавка проиграна.`);
            }

            state.activeBet = null;
            localStorage.removeItem('real_wc_bet');
            updateBalanceDisplay();
        }
    }

    function render() {
        if (!state.currentMatch) return;

        const home = state.currentMatch.home_team.country || 'Команда A';
        const away = state.currentMatch.away_team.country || 'Команда B';

        document.getElementById('team1').innerText = home;
        document.getElementById('team2').innerText = away;
        document.getElementById('btn-team1').innerText = 'П1: ' + home;
        document.getElementById('btn-team2').innerText = 'П2: ' + away;

        const statusEl = document.getElementById('match-status');
        const timeEl = document.getElementById('match-time');
        const matchDate = new Date(state.currentMatch.datetime);
        const dateStr = matchDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ' ' + matchDate.toLocaleDateString([], {day:'numeric', month:'short'});

        const betButtons = document.querySelectorAll('.bet-btn');

        if (state.currentMatch.status === 'future') {
            statusEl.innerText = "Прием ставок открыт";
            statusEl.style.color = "var(--accent-color)";
            timeEl.innerText = `Начало: ${dateStr}`;
            betButtons.forEach(b => b.disabled = false);
        } else if (state.currentMatch.status === 'in_progress') {
            statusEl.innerText = "Матч идет в прямом эфире";
            statusEl.style.color = "var(--success-color)";
            timeEl.innerText = `Играют прямо сейчас. Ставки закрыты.`;
            betButtons.forEach(b => b.disabled = true);
        } else {
            statusEl.innerText = "Матч завершен";
            statusEl.style.color = "var(--text-muted)";
            timeEl.innerText = `Финальный счет: ${state.currentMatch.home_team.goals}:${state.currentMatch.away_team.goals}`;
            betButtons.forEach(b => b.disabled = true);
        }

        if (state.activeBet) {
            document.getElementById('bet-section').style.display = 'none';
            document.getElementById('active-bet-display').style.display = 'block';
            
            let choiceText = 'Ничью';
            if (state.activeBet.choice === '1') choiceText = home;
            if (state.activeBet.choice === '2') choiceText = away;

            document.getElementById('bet-detail').innerText = `${state.activeBet.amount} коинов на ${choiceText}. Ждем завершения матча на сервере.`;
        } else {
            document.getElementById('bet-section').style.display = 'flex';
            document.getElementById('active-bet-display').style.display = 'none';
        }
    }

    function placeBet(choice) {
        if (state.activeBet || state.currentMatch.status !== 'future') return;

        const amountInput = document.getElementById('bet-amount');
        const amount = parseInt(amountInput.value);

        if (isNaN(amount) || amount <= 0 || amount > state.balance) {
            showNotification('Неверная сумма ставки или не хватает баланса!', 'error');
            return;
        }

        state.balance -= amount;
        state.activeBet = {
            matchId: state.currentMatch.id,
            amount: amount,
            choice: choice
        };

        localStorage.setItem('real_wc_bet', JSON.stringify(state.activeBet));
        updateBalanceDisplay();
        render();
        showNotification('Ставка принята на реальный матч!', 'success');
    }

    function setAllIn() {
        document.getElementById('bet-amount').value = state.balance;
    }

    function showNotification(text, type) {
        const n = document.getElementById('notification');
        n.className = `notification ${type}`;
        n.innerText = text;
    }

    function resetApp() {
        localStorage.clear();
        state.balance = 100;
        state.activeBet = null;
        updateBalanceDisplay();
        loadDataFromAPI();
    }

    window.onload = init;
</script>
</body>
</html>
