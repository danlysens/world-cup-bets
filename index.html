<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>world cup 2026 betting</title>
<style>
  body { font-family: monospace; background: #111; color: #fff; text-align: center; padding: 50px; }
  .hidden { display: none; }
  input, button { padding: 10px; margin: 5px; font-size: 16px; }
  button { background: #00ff66; color: #000; border: none; font-weight: bold; cursor: pointer; }
  button:hover { background: #00cc52; }
  .card { background: #222; padding: 20px; margin-top: 20px; border-radius: 8px; border: 1px solid #333; }
</style>
</head>
<body>

<div id="login-box">
  <h2>login</h2>
  <input type="text" id="username" placeholder="username">
  <input type="password" id="password" placeholder="password">
  <br>
  <button onclick="login()">enter</button>
</div>

<div id="game-box" class="hidden">
  <h2>user: <span id="user-display"></span></h2>
  <h3>tokens: <span id="tokens-display">100</span></h3>
  
  <div class="card" id="match-card">
    <p>fetching live world cup games...</p>
  </div>

  <div id="bet-box" class="hidden">
    <input type="number" id="bet-amount" placeholder="bet amount" min="1">
    <br>
    <button onclick="placeBet('home')" id="btn-home">home</button>
    <button onclick="placeBet('draw')">draw</button>
    <button onclick="placeBet('away')" id="btn-away">away</button>
  </div>
  
  <p id="msg"></p>
</div>

<script>
  // using thesportsdb free public development key '2'
  const API_URL = 'https://www.thesportsdb.com/api/v1/json/2/latestedivision.php?id=4328'; 
  
  let tokens = 100;
  let match = null;
  let bet = null;

  function login() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    if (!user || !pass) return alert('fill the damn fields');
    
    document.getElementById('login-box').classList.add('hidden');
    document.getElementById('game-box').classList.remove('hidden');
    document.getElementById('user-display').innerText = user;
    
    fetchMatch();
    setInterval(fetchMatch, 30000); 
  }

  async function fetchMatch() {
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      
      if (!data.events || data.events.length === 0) {
        document.getElementById('match-card').innerHTML = '<p>no live world cup games found right now.</p>';
        return;
      }
      
      // grab the first available live or recent match
      match = data.events[0];
      render();
      checkBet();
    } catch (e) {
      document.getElementById('match-card').innerHTML = '<p>api error fetching data.</p>';
    }
  }

  function render() {
    const h = match.strHomeTeam;
    const a = match.strAwayTeam;
    const gh = match.intHomeScore ?? 0;
    const ga = match.intAwayScore ?? 0;
    const status = match.strStatus; // returns 'Progress' or 'FT'

    document.getElementById('match-card').innerHTML = `
      <p>status: ${status}</p>
      <h2>${h} ${gh} - ${ga} ${a}</h2>
    `;

    document.getElementById('btn-home').innerText = h;
    document.getElementById('btn-away').innerText = a;
    
    if (!bet && status === 'Progress') {
      document.getElementById('bet-box').classList.remove('hidden');
    }
  }

  function placeBet(pick) {
    const amt = parseInt(document.getElementById('bet-amount').value);
    if (isNaN(amt) || amt <= 0) return alert('invalid amount');
    if (amt > tokens) return alert('not enough tokens');

    tokens -= amt;
    document.getElementById('tokens-display').innerText = tokens;
    
    bet = { pick, amt, id: match.idEvent };
    document.getElementById('bet-box').classList.add('hidden');
    document.getElementById('msg').innerText = `bet placed on ${pick} for ${amt} tokens. waiting for match to finish...`;
  }

  function checkBet() {
    if (!bet || match.strStatus !== 'FT' || bet.id !== match.idEvent) return;

    const gh = parseInt(match.intHomeScore);
    const ga = parseInt(match.intAwayScore);
    
    let winner = 'draw';
    if (gh > ga) winner = 'home';
    if (ga > gh) winner = 'away';

    if (bet.pick === winner) {
      tokens += bet.amt * 2;
      document.getElementById('msg').innerText = `match finished! you won ${bet.amt * 2} tokens.`;
    } else {
      document.getElementById('msg').innerText = `match finished! you lost your bet.`;
    }

    document.getElementById('tokens-display').innerText = tokens;
    bet = null;
  }
</script>
</body>
</html>
