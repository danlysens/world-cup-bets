
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЧМ-2026 Реальный Счет & Виртуальные Ставки</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        h1 { font-size: 1.2rem; font-weight: 700; }

        .balance-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--accent-color);
            font-weight: bold;
        }
        .balance-box span { color: var(--success-color); }

        .bet-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .row { display: flex; gap: 12px; }
        .flex-1 { flex: 1; }

        label { font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 6px; }

        input, select {
            width: 100%;
            background: #0b0f19;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus, select:focus { border-color: var(--accent-color); }

        .main-btn {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .main-btn:hover { opacity: 0.9; }
        .main-btn.success { background: var(--success-color); }

        .active-bet-card {
            background: rgba(59, 130, 246, 0.1);
            border: 1px dashed var(--accent-color);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            margin-top: 16px;
        }

        .widget-container {
            width: 100%;
            max-width: 600px;
            height: 500px;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        iframe { width: 100%; height: 100%; border: none; }

        .reset-btn {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            font-size: 0.8rem; text-decoration: underline; margin-top: 12px; display: block; width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Ставки ЧМ-2026 (Live Счет ниже)</h1>
        <div class="balance-box">Баланс: <span id="balance">100</span> 🪙</div>
    </header>

    <main>
        <div id="bet-section" class="bet-form">
            <div class="row">
                <div class="flex-1">
                    <label>Кто играет? (например: Германия)</label>
                    <input type="text" id="match-name" placeholder="Пиши команды для себя">
                </div>
            </div>
            <div class="row">
                <div class="flex-1">
                    <label>Твой исход</label>
                    <select id="bet-choice">
                        <option value="1">Победа Команды 1 (П1)</option>
                        <option value="X">Ничья (X)</option>
                        <option value="2">Победа Команды 2 (П2)</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label>Сумма ставки</label>
                    <input type="number" id="bet-amount" min="1" value="10">
                </div>
            </div>
            <button class="main-btn" onclick="makeBet()">Поставить токены</button>
        </div>

        <div id="active-bet-display" class="active-bet-card" style="display: none;">
            <p style="margin-bottom: 12px; font-weight: 600;">
                Ставка принята на матч: <span id="display-match" style="color:var(--accent-color)">-</span>
            </p>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px;">
                Прогноз: <span id="display-choice" style="color:#fff">-</span> | Сумма: <span id="display-amount" style="color:var(--success-color)">-</span> 🪙
            </p>
            <button class="main-btn success" onclick="resolveBetManual()">Ввести финальный счет матча</button>
        </div>

        <button class="reset-btn" onclick="resetAll()">Сбросить баланс до 100</button>
    </main>
</div>

<div class="widget-container">
    <iframe src="https://mscore.ru/football/world-cup"></iframe>
</div>

<script>
    let state = {
        balance: 100,
        activeBet: null
    };

    function init() {
        const savedBalance = localStorage.getItem('man_wc_bal');
        const savedBet = localStorage.getItem('man_wc_bet');
        
        if (savedBalance !== null) state.balance = parseInt(savedBalance);
        if (savedBet !== null) state.activeBet = JSON.parse(savedBet);

        updateUI();
    }

    function updateUI() {
        document.getElementById('balance').innerText = state.balance;
        localStorage.setItem('man_wc_bal', state.balance);

        if (state.activeBet) {
            document.getElementById('bet-section').style.display = 'none';
            document.getElementById('active-bet-display').style.display = 'block';

            document.getElementById('display-match').innerText = state.activeBet.match;
            document.getElementById('display-amount').innerText = state.activeBet.amount;
            
            let choiceText = "Ничья";
            if (state.activeBet.choice === "1") choiceText = "Победа первой команды";
            if (state.activeBet.choice === "2") choiceText = "Победа второй команды";
            document.getElementById('display-choice').innerText = choiceText;
        } else {
            document.getElementById('bet-section').style.display = 'flex';
            document.getElementById('active-bet-display').style.display = 'none';
        }
    }

    function makeBet() {
        const match = document.getElementById('match-name').value.trim();
        const amount = parseInt(document.getElementById('bet-amount').value);
        const choice = document.getElementById('bet-choice').value;

        if (!match) { alert('Впиши название матча или команд для контроля!'); return; }
        if (isNaN(amount) || amount <= 0 || amount > state.balance) { alert('Неверная сумма ставки или мало коинов!'); return; }

        state.balance -= amount;
        state.activeBet = { match, amount, choice };
        
        localStorage.setItem('man_wc_bet', JSON.stringify(state.activeBet));
        updateUI();
    }

    function resolveBetManual() {
        if (!state.activeBet) return;

        const score = prompt("Посмотри реальный исход матча в виджете ниже.\n\nВведи сколько забила первая команда (цифрой):");
        if (score === null) return;
        const goals1 = parseInt(score);

        const score2 = prompt("Введи сколько забила вторая команда (цифрой):");
        if (score2 === null) return;
        const goals2 = parseInt(score2);

        if (isNaN(goals1) || isNaN(goals2)) { alert('Нужно вводить только числа!'); return; }

        let realResult = "X";
        if (goals1 > goals2) realResult = "1";
        if (goals2 > goals1) realResult = "2";

        const isWin = state.activeBet.choice === realResult;

        if (isWin) {
            const winSum = state.activeBet.amount * 2;
            state.balance += winSum;
            alert(`Отлично! Реальный счет ${goals1}:${goals2} подтвержден. Твой исход совпал, держи ${winSum} коинов!`);
        } else {
            alert(`Реальный счет ${goals1}:${goals2} подтвержден. Твой исход не совпал, ставка сгорела.`);
        }

        state.activeBet = null;
        localStorage.removeItem('man_wc_bet');
        updateUI();
    }

    function resetAll() {
        localStorage.clear();
        state.balance = 100;
        state.activeBet = null;
        updateUI();
    }

    window.onload = init;
</script>
</body>
</html>
